<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ site.title }}{% endblock %}</title>
    <meta name="description" content="{{ site.description }}">
    <link rel="stylesheet" href="{{ rel('static/css/base.css') }}">
    {% block head_extra %}{% endblock %}
</head>
<body>
<a class="skip-link" href="#main">Skip to main content</a>
{% include 'components/navbar.html' %}
<main id="main" class="main-content">
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</main>
{% include 'components/footer.html' %}
<script>
// Lazy-hydrate <video data-src="..."> when the card scrolls into view.
// Lets pages embed hundreds of off-screen videos without firing hundreds
// of HF metadata requests on first paint.
(function () {
    'use strict';
    function hydrate(v) {
        var url = v.getAttribute('data-src');
        if (!url) return;
        v.preload = 'metadata';
        v.src = url;
        v.removeAttribute('data-src');
    }
    function init() {
        var vids = document.querySelectorAll('video[data-src]');
        if (!vids.length) return;
        if (!('IntersectionObserver' in window)) {
            vids.forEach(hydrate);
            return;
        }
        var io = new IntersectionObserver(function (entries) {
            entries.forEach(function (e) {
                if (!e.isIntersecting) return;
                hydrate(e.target);
                io.unobserve(e.target);
            });
        }, { rootMargin: '300px 0px' });
        vids.forEach(function (v) { io.observe(v); });
    }
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
})();
</script>
{% block scripts %}{% endblock %}
</body>
</html>
